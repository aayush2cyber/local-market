<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login or create an account on Nirjuli Market Online.">
  <title>Login — Nirjuli Market Online</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Navbar -->
    <nav class="navbar glass-header" id="navbar">
      <div class="nav-container">
        <a href="/" class="logo">
          <span class="logo-icon">🏪</span>
          <span class="logo-text">Nirjuli <span class="highlight">Market</span></span>
        </a>
        <div class="nav-links">
          <a href="/" class="nav-link">Home</a>
          <a href="/about.html" class="nav-link">About</a>
        </div>
      </div>
    </nav>

    <!-- Auth Section -->
    <section class="auth-section">
      <div class="auth-container glass-card">
        <!-- Tab Switcher -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
          <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form">
          <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
          </div>
          <div class="form-group">
            <label for="loginEmail"><i class="fa-solid fa-envelope"></i> Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="loginPassword"><i class="fa-solid fa-lock"></i> Password</label>
            <div class="password-wrapper">
              <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
              <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword', this)"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div id="loginError" class="auth-error hidden"></div>
          <button type="submit" class="auth-submit" id="loginSubmitBtn">
            <span>Sign In</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form hidden">
          <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join Nirjuli Market today</p>
          </div>
          <div class="form-group">
            <label for="signupName"><i class="fa-solid fa-user"></i> Full Name</label>
            <input type="text" id="signupName" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label for="signupEmail"><i class="fa-solid fa-envelope"></i> Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="signupPassword"><i class="fa-solid fa-lock"></i> Password</label>
            <div class="password-wrapper">
              <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
              <button type="button" class="toggle-pw" onclick="togglePassword('signupPassword', this)"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-user-tag"></i> I want to</label>
            <div class="role-select">
              <label class="role-option active">
                <input type="radio" name="role" value="customer" checked>
                <div class="role-card">
                  <i class="fa-solid fa-bag-shopping"></i>
                  <span>Shop & Order</span>
                  <small>Customer</small>
                </div>
              </label>
              <label class="role-option">
                <input type="radio" name="role" value="shopkeeper">
                <div class="role-card">
                  <i class="fa-solid fa-store"></i>
                  <span>Sell Products</span>
                  <small>Shopkeeper</small>
                </div>
              </label>
            </div>
          </div>
          <div id="signupError" class="auth-error hidden"></div>
          <button type="submit" class="auth-submit" id="signupSubmitBtn">
            <span>Create Account</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <!-- OTP Form -->
        <form id="otpForm" class="auth-form hidden">
          <div class="auth-header">
            <h2>Admin Verification</h2>
            <p>Enter the 6-digit OTP sent to your email.</p>
          </div>
          <div class="form-group">
            <label for="loginOtp"><i class="fa-solid fa-key"></i> OTP</label>
            <input type="text" id="loginOtp" placeholder="123456" required autocomplete="one-time-code" maxlength="6" pattern="\d{6}">
            <small style="color:var(--text-muted); margin-top:5px; display:block;">Check your email inbox (and spam folder).</small>
          </div>
          <div id="otpError" class="auth-error hidden"></div>
          <button type="submit" class="auth-submit" id="otpSubmitBtn">
            <span>Verify & Login</span>
            <i class="fa-solid fa-check"></i>
          </button>
          <button type="button" class="auth-submit" style="background:transparent; color:var(--text-color); border:1px solid var(--border-color); margin-top:10px;" onclick="window.location.reload()">
            <span>Cancel</span>
          </button>
        </form>
      </div>
    </section>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // If already logged in, redirect
    if (isLoggedIn()) {
      const user = getUser();
      redirectByRole(user.role);
    }

    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const loginTab = document.getElementById('loginTab');
      const signupTab = document.getElementById('signupTab');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
      } else {
        signupForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        signupTab.classList.add('active');
        loginTab.classList.remove('active');
      }
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }

    // Role card visual toggle
    document.querySelectorAll('.role-option input').forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
        radio.closest('.role-option').classList.add('active');
      });
    });

    let pendingAdminEmail = '';

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginSubmitBtn');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

      try {
        const email = document.getElementById('loginEmail').value;
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        
        if (data.requireOtp) {
          // Switch to OTP form
          pendingAdminEmail = data.email || email;
          document.getElementById('loginForm').classList.add('hidden');
          document.getElementById('otpForm').classList.remove('hidden');
          document.querySelector('.auth-tabs').classList.add('hidden'); // hide tabs
        } else {
          saveAuth(data.token, data.user);
          redirectByRole(data.user.role);
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>Sign In</span><i class="fa-solid fa-arrow-right"></i>';
      }
    });

    // Verify OTP
    document.getElementById('otpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('otpError');
      const btn = document.getElementById('otpSubmitBtn');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';

      try {
        const res = await fetch('/api/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: pendingAdminEmail,
            otp: document.getElementById('loginOtp').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'OTP Verification failed');
        
        saveAuth(data.token, data.user);
        redirectByRole(data.user.role);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>Verify & Login</span><i class="fa-solid fa-check"></i>';
      }
    });

    // Signup
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('signupError');
      const btn = document.getElementById('signupSubmitBtn');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';

      try {
        const role = document.querySelector('input[name="role"]:checked').value;
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('signupName').value,
            email: document.getElementById('signupEmail').value,
            password: document.getElementById('signupPassword').value,
            role
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Signup failed');
        saveAuth(data.token, data.user);
        redirectByRole(data.user.role);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-arrow-right"></i>';
      }
    });
  </script>
</body>
</html>
